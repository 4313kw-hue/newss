<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>校長自我介紹</title>

<style>
body {
    margin: 0;
    font-family: "微軟正黑體", sans-serif;
    background-color: #f4f8fb;
    color: #333;
}

/* 標題 */
header {
    background: linear-gradient(to right, #4A90E2, #50C9C3);
    color: white;
    text-align: center;
    padding: 40px 20px;
}

/* 主內容 */
.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

/* 區塊 */
.section {
    background: white;
    margin: 20px 0;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

/* 照片 */
.profile {
    text-align: center;
}

.profile img {
    width: 200px;
    border-radius: 50%;
    border: 5px solid #4A90E2;
}

/* 標題 */
h2 {
    text-align: center;
    color: #4A90E2;
}

/* RWD */
@media (max-width: 600px) {
    .profile img {
        width: 150px;
    }
}
</style>

</head>

<body>

<header>
    <h1>新竹縣嘉豐國小 校長</h1>
    <h2>教育理念與自我介紹</h2>
</header>

<div class="container">

    <!-- 個人照片 -->
    <div class="section profile">
        <img src="principal.png" alt="校長照片">
        <h2>校長您好</h2>
        <p>歡迎來到我的個人介紹網頁</p>
    </div>

    <!-- 基本介紹 -->
    <div class="section">
        <h2>👤 基本資料</h2>
        <p>姓名：請填寫您的姓名</p>
        <p>現職：新竹縣嘉豐國小 校長</p>
    </div>

    <!-- 教育理念 -->
    <div class="section">
        <h2>🎯 教育理念</h2>
        <p>
        致力於打造以學生為中心的學習環境，培養孩子具備自主學習、
        品格教育與國際視野，讓每一位孩子都能發揮潛能、快樂成長。
        </p>
    </div>

    <!-- 學經歷 -->
    <div class="section">
        <h2>📚 學經歷</h2>
        <ul>
            <li>請填寫學歷</li>
            <li>曾任職務一</li>
            <li>曾任職務二</li>
        </ul>
    </div>

    <!-- 聯絡資訊 -->
    <div class="section">
        <h2>📞 聯絡資訊</h2>
        <p>Email：your@email.com</p>
        <p>電話：請填寫</p>
    </div>

</div>

</body>
</html>
